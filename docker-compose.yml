services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-botpass}
      POSTGRES_DB: ${POSTGRES_DB:-botdb}
    ports:
      - "5432:5432"
    volumes:
      - dbdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot} -d ${POSTGRES_DB:-botdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command:
      - /usr/local/bin/migrate
      - -path
      - /app/migrations
      - -database
      - ${DATABASE_URL:-postgres://bot:botpass@db:5432/botdb?sslmode=disable}
      - up
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env

volumes:
  dbdata_local:
